# DO NOT EDIT azure-pipelines-daily.yml.  Edit azure-pipelines-daily.yml.m4 and defs.m4 instead.

trigger: none
pr: none

schedules:
  # 8am UTC is midnight PST.
  - cron: '0 8 * * *'
    displayName: Daily midnight build
    branches:
      include:
        - master

variables:
  system.debug: true

jobs:

  # The dependsOn clauses are:
  #  * Everything depends on the canary jobs (the main jdk25 jobs), except those jobs themselves.
  #  * Any other *_jdkNN job depends on the corresponding *_jdk25 job.

  - job: canary_jobs
    dependsOn:
      - junit_part1_jdk25
      - junit_part2_jdk25
      - nonjunit_jdk25
      - inference_part1_jdk25
      - inference_part2_jdk25
      - typecheck_part1_jdk25
      - typecheck_part2_jdk25
    pool:
      vmImage: 'ubuntu-latest'
    steps:
      - bash: true
        displayName: canary_jobs

  - job: junit_jdk17
    dependsOn:
      - canary_jobs
      - junit_part1_jdk25
      - junit_part2_jdk25
    pool:
      vmImage: 'ubuntu-latest'
    container: mdernst/cf-ubuntu-jdk17:latest
    timeoutInMinutes: 70
    steps:
      - checkout: self
        fetchDepth: 25
      - bash: export ORG_GRADLE_PROJECT_jdkTestVersion=17 && ./checker/bin-devel/test-cftests-junit.sh
        displayName: test-cftests-junit.sh
  - job: junit_jdk21
    dependsOn:
      - canary_jobs
      - junit_part1_jdk25
      - junit_part2_jdk25
    pool:
      vmImage: 'ubuntu-latest'
    container: mdernst/cf-ubuntu-jdk21:latest
    timeoutInMinutes: 70
    steps:
      - checkout: self
        fetchDepth: 25
      - bash: export ORG_GRADLE_PROJECT_jdkTestVersion=21 && ./checker/bin-devel/test-cftests-junit.sh
        displayName: test-cftests-junit.sh
  - job: junit_part1_jdk25
    pool:
      vmImage: 'ubuntu-latest'
    container: mdernst/cf-ubuntu-jdk25:latest
    timeoutInMinutes: 70
    steps:
      - checkout: self
        fetchDepth: 25
      - bash: export ORG_GRADLE_PROJECT_jdkTestVersion=25 && ./checker/bin-devel/test-cftests-junit.sh part1
        displayName: test-cftests-junit.sh part1
  - job: junit_part2_jdk25
    pool:
      vmImage: 'ubuntu-latest'
    container: mdernst/cf-ubuntu-jdk25:latest
    timeoutInMinutes: 70
    steps:
      - checkout: self
        fetchDepth: 25
      - bash: export ORG_GRADLE_PROJECT_jdkTestVersion=25 && ./checker/bin-devel/test-cftests-junit.sh part2
        displayName: test-cftests-junit.sh part2
  - job: junit_jdk26
    dependsOn:
      - canary_jobs
      - junit_part1_jdk25
      - junit_part2_jdk25
    pool:
      vmImage: 'ubuntu-latest'
    container: mdernst/cf-ubuntu-jdk26:latest
    timeoutInMinutes: 70
    steps:
      - checkout: self
        fetchDepth: 25
      - bash: export ORG_GRADLE_PROJECT_jdkTestVersion=26 && ./checker/bin-devel/test-cftests-junit.sh
        displayName: test-cftests-junit.sh

  - job: nonjunit_jdk17
    dependsOn:
      - canary_jobs
      - nonjunit_jdk25
    pool:
      vmImage: 'ubuntu-latest'
    container: mdernst/cf-ubuntu-jdk17:latest
    steps:
      - checkout: self
        fetchDepth: 25
      - bash: export ORG_GRADLE_PROJECT_jdkTestVersion=17 && ./checker/bin-devel/test-cftests-nonjunit.sh
        displayName: test-cftests-nonjunit.sh
  - job: nonjunit_jdk21
    dependsOn:
      - canary_jobs
      - nonjunit_jdk25
    pool:
      vmImage: 'ubuntu-latest'
    container: mdernst/cf-ubuntu-jdk21:latest
    steps:
      - checkout: self
        fetchDepth: 25
      - bash: export ORG_GRADLE_PROJECT_jdkTestVersion=21 && ./checker/bin-devel/test-cftests-nonjunit.sh
        displayName: test-cftests-nonjunit.sh
  - job: nonjunit_jdk25
    pool:
      vmImage: 'ubuntu-latest'
    container: mdernst/cf-ubuntu-jdk25:latest
    steps:
      - checkout: self
        fetchDepth: 25
      - bash: export ORG_GRADLE_PROJECT_jdkTestVersion=25 && ./checker/bin-devel/test-cftests-nonjunit.sh
        displayName: test-cftests-nonjunit.sh
  - job: nonjunit_jdk26
    dependsOn:
      - canary_jobs
      - nonjunit_jdk25
    pool:
      vmImage: 'ubuntu-latest'
    container: mdernst/cf-ubuntu-jdk26:latest
    steps:
      - checkout: self
        fetchDepth: 25
      - bash: export ORG_GRADLE_PROJECT_jdkTestVersion=26 && ./checker/bin-devel/test-cftests-nonjunit.sh
        displayName: test-cftests-nonjunit.sh

  # Sometimes one of the invocations of wpi-many in `./gradlew wpiManyTest`
  # takes much longer to complete than normal, and this Azure job times out.
  # When there is a timeout, one cannot examine wpi or wpi-many logs.
  # So use a timeout of 90 minutes, and hope that is enough.
  - job: inference_jdk17
    dependsOn:
      - canary_jobs
      - inference_part1_jdk25
      - inference_part2_jdk25
    pool:
      vmImage: 'ubuntu-latest'
    container: mdernst/cf-ubuntu-jdk17:latest
    timeoutInMinutes: 90
    steps:
      - checkout: self
        fetchDepth: 25
      - bash: export ORG_GRADLE_PROJECT_jdkTestVersion=17 && ./checker/bin-devel/test-cftests-inference.sh
        displayName: test-cftests-inference.sh

  - job: inference_jdk21
    dependsOn:
      - canary_jobs
      - inference_part1_jdk25
      - inference_part2_jdk25
    pool:
      vmImage: 'ubuntu-latest'
    container: mdernst/cf-ubuntu-jdk21:latest
    timeoutInMinutes: 90
    steps:
      - checkout: self
        fetchDepth: 25
      - bash: export ORG_GRADLE_PROJECT_jdkTestVersion=21 && ./checker/bin-devel/test-cftests-inference.sh
        displayName: test-cftests-inference.sh

  # Split into part1 and part2 only for the inference job that "canary_jobs" depends on.
  - job: inference_part1_jdk25
    pool:
      vmImage: 'ubuntu-latest'
    container: mdernst/cf-ubuntu-jdk25:latest
    timeoutInMinutes: 90
    steps:
      - checkout: self
        fetchDepth: 25
      - bash: export ORG_GRADLE_PROJECT_jdkTestVersion=25 && ./checker/bin-devel/test-cftests-inference-part1.sh
        displayName: test-cftests-inference-part1.sh
  - job: inference_part2_jdk25
    pool:
      vmImage: 'ubuntu-latest'
    container: mdernst/cf-ubuntu-jdk25:latest
    timeoutInMinutes: 90
    steps:
      - checkout: self
        fetchDepth: 25
      - bash: export ORG_GRADLE_PROJECT_jdkTestVersion=25 && ./checker/bin-devel/test-cftests-inference-part2.sh
        displayName: test-cftests-inference-part2.sh

  - job: inference_jdk26
    dependsOn:
      - canary_jobs
      - inference_part1_jdk25
      - inference_part2_jdk25
    pool:
      vmImage: 'ubuntu-latest'
    container: mdernst/cf-ubuntu-jdk26:latest
    timeoutInMinutes: 90
    steps:
      - checkout: self
        fetchDepth: 25
      - bash: export ORG_GRADLE_PROJECT_jdkTestVersion=26 && ./checker/bin-devel/test-cftests-inference.sh
        displayName: test-cftests-inference.sh

  # Do not run misc_job daily, because it does diffs that assume it is running in
  # a pull request.

  - job: typecheck_jdk17
    dependsOn:
      - canary_jobs
      - typecheck_part1_jdk25
      - typecheck_part2_jdk25
    pool:
      vmImage: 'ubuntu-latest'
    container: mdernst/cf-ubuntu-jdk17:latest
    steps:
      - checkout: self
        fetchDepth: 1000
      - bash: export ORG_GRADLE_PROJECT_jdkTestVersion=17 && ./checker/bin-devel/test-typecheck.sh
        displayName: test-typecheck.sh
  - job: typecheck_jdk21
    dependsOn:
      - canary_jobs
      - typecheck_part1_jdk25
      - typecheck_part2_jdk25
    pool:
      vmImage: 'ubuntu-latest'
    container: mdernst/cf-ubuntu-jdk21:latest
    steps:
      - checkout: self
        fetchDepth: 1000
      - bash: export ORG_GRADLE_PROJECT_jdkTestVersion=21 && ./checker/bin-devel/test-typecheck.sh
        displayName: test-typecheck.sh
  - job: typecheck_part1_jdk25
    pool:
      vmImage: 'ubuntu-latest'
    container: mdernst/cf-ubuntu-jdk25:latest
    steps:
      - checkout: self
        fetchDepth: 1000
      - bash: export ORG_GRADLE_PROJECT_jdkTestVersion=25 && ./checker/bin-devel/test-typecheck-part1.sh
        displayName: test-typecheck-part1.sh
  - job: typecheck_part2_jdk25
    pool:
      vmImage: 'ubuntu-latest'
    container: mdernst/cf-ubuntu-jdk25:latest
    steps:
      - checkout: self
        fetchDepth: 1000
      - bash: export ORG_GRADLE_PROJECT_jdkTestVersion=25 && ./checker/bin-devel/test-typecheck-part2.sh
        displayName: test-typecheck-part2.sh
  - job: typecheck_jdk26
    dependsOn:
      - canary_jobs
      - typecheck_part1_jdk25
      - typecheck_part2_jdk25
    pool:
      vmImage: 'ubuntu-latest'
    container: mdernst/cf-ubuntu-jdk26:latest
    steps:
      - checkout: self
        fetchDepth: 1000
      - bash: export ORG_GRADLE_PROJECT_jdkTestVersion=26 && ./checker/bin-devel/test-typecheck.sh
        displayName: test-typecheck.sh

  # TEMPORARILY commented until Daikon release 5.8.24.
  # daikon_job(17)
  # daikon_job(21)
  # daikon_job(canary_version)
  # daikon_job(latest_version)

  - job: guava_jdk17
    dependsOn:
      - canary_jobs
      - guava_jdk25
    pool:
      vmImage: 'ubuntu-latest'
    container: mdernst/cf-ubuntu-jdk17:latest
    timeoutInMinutes: 70
    steps:
      - checkout: self
        fetchDepth: 25
      - bash: export ORG_GRADLE_PROJECT_jdkTestVersion=17 && ./checker/bin-devel/test-guava.sh
        displayName: test-guava.sh
  - job: guava_jdk21
    dependsOn:
      - canary_jobs
      - guava_jdk25
    pool:
      vmImage: 'ubuntu-latest'
    container: mdernst/cf-ubuntu-jdk21:latest
    timeoutInMinutes: 70
    steps:
      - checkout: self
        fetchDepth: 25
      - bash: export ORG_GRADLE_PROJECT_jdkTestVersion=21 && ./checker/bin-devel/test-guava.sh
        displayName: test-guava.sh
  - job: guava_jdk25
    dependsOn:
      - canary_jobs
    pool:
      vmImage: 'ubuntu-latest'
    container: mdernst/cf-ubuntu-jdk25:latest
    timeoutInMinutes: 70
    steps:
      - checkout: self
        fetchDepth: 25
      - bash: export ORG_GRADLE_PROJECT_jdkTestVersion=25 && ./checker/bin-devel/test-guava.sh
        displayName: test-guava.sh
  - job: guava_jdk26
    dependsOn:
      - canary_jobs
      - guava_jdk25
    pool:
      vmImage: 'ubuntu-latest'
    container: mdernst/cf-ubuntu-jdk26:latest
    timeoutInMinutes: 70
    steps:
      - checkout: self
        fetchDepth: 25
      - bash: export ORG_GRADLE_PROJECT_jdkTestVersion=26 && ./checker/bin-devel/test-guava.sh
        displayName: test-guava.sh

  - job: plume_lib_jdk17
    dependsOn:
      - canary_jobs
      - plume_lib_jdk25
    pool:
      vmImage: 'ubuntu-latest'
    container: mdernst/cf-ubuntu-jdk17:latest
    steps:
      - checkout: self
        fetchDepth: 25
      - bash: export ORG_GRADLE_PROJECT_jdkTestVersion=17 && ./checker/bin-devel/test-plume-lib.sh
        displayName: test-plume-lib.sh
  - job: plume_lib_jdk21
    dependsOn:
      - canary_jobs
      - plume_lib_jdk25
    pool:
      vmImage: 'ubuntu-latest'
    container: mdernst/cf-ubuntu-jdk21:latest
    steps:
      - checkout: self
        fetchDepth: 25
      - bash: export ORG_GRADLE_PROJECT_jdkTestVersion=21 && ./checker/bin-devel/test-plume-lib.sh
        displayName: test-plume-lib.sh
  - job: plume_lib_jdk25
    dependsOn:
      - canary_jobs
    pool:
      vmImage: 'ubuntu-latest'
    container: mdernst/cf-ubuntu-jdk25:latest
    steps:
      - checkout: self
        fetchDepth: 25
      - bash: export ORG_GRADLE_PROJECT_jdkTestVersion=25 && ./checker/bin-devel/test-plume-lib.sh
        displayName: test-plume-lib.sh
  - job: plume_lib_jdk26
    dependsOn:
      - canary_jobs
      - plume_lib_jdk25
    pool:
      vmImage: 'ubuntu-latest'
    container: mdernst/cf-ubuntu-jdk26:latest
    steps:
      - checkout: self
        fetchDepth: 25
      - bash: export ORG_GRADLE_PROJECT_jdkTestVersion=26 && ./checker/bin-devel/test-plume-lib.sh
        displayName: test-plume-lib.sh
